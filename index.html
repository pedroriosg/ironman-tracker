<style>

  :root{
    --bg:#f5f5f4;--surface:#ffffff;--surface2:#f9f9f8;--border:#e5e5e3;
    --text:#1a1a18;--muted:#888780;--sub:#5f5e5a;
    --red:#E24B4A;--red-light:#FCEBEB;--red-border:#F7C1C1;--red-dark:#A32D2D;
    --green:#639922;--green-light:#EAF3DE;--green-border:#C0DD97;--green-dark:#3B6D11;
    --blue:#378ADD;--blue-light:#E6F1FB;--blue-dark:#185FA5;
    --amber:#BA7517;--amber-light:#FAEEDA;--amber-dark:#854F0B;
    --gray-light:#F1EFE8;--gray-dark:#5F5E5A;
    --radius:10px;--card-radius:14px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1c1c1a;--surface:#2a2a28;--surface2:#222220;--border:#3a3a38;
      --text:#f0f0ee;--muted:#666662;--sub:#9a9a95;
    }
  }
  html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:var(--text)}
  .app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg)}

  /* HEADER */
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,12px) 16px 0;flex-shrink:0}
  .header-top{display:flex;align-items:center;justify-content:space-between;padding-top:12px;margin-bottom:10px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-circle{width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
  .logo-name{font-size:16px;font-weight:600;color:var(--text)}
  .logo-sub{font-size:11px;color:var(--muted);margin-top:1px}
  .days-left{text-align:right}
  .days-num{font-size:22px;font-weight:700;color:var(--red);line-height:1}
  .days-lbl{font-size:10px;color:var(--muted)}

  /* TABS */
  .tabs{display:flex;margin-top:4px}
  .tab{flex:1;padding:10px 2px 8px;font-size:12px;font-weight:500;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;display:flex;align-items:center;justify-content:center;gap:4px}
  .tab svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tab.active{color:var(--red);border-bottom-color:var(--red)}

  /* CONTENT */
  .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px;display:none;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 14px)}
  .content.active{display:block}

  /* CARDS */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:14px;margin-bottom:10px}
  .card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:7px}

  /* SESSION */
  .session-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .sport-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .session-slot{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:3px}
  .session-name{font-size:15px;font-weight:600;color:var(--text);line-height:1.3}
  .type-badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;margin-top:6px}
  .check-row{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border);margin-top:4px}
  .check-lbl{font-size:12px;color:var(--muted)}
  .btn-group{display:flex;gap:8px}
  .btn-check{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--sub);transition:all .15s;min-width:72px;text-align:center}
  .btn-check.done{background:var(--green-light);border-color:var(--green);color:var(--green-dark)}
  .btn-check.skip{background:var(--red-light);border-color:var(--red);color:var(--red-dark)}
  .rest-pill{background:var(--surface2);border:1px solid var(--border);border-radius:var(--card-radius);padding:18px;text-align:center;color:var(--muted);font-size:13px;margin-bottom:10px}

  /* WEEK BADGE */
  .week-tag{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--sub);margin-bottom:14px}
  .today-date{font-size:13px;color:var(--muted);margin-bottom:10px}
  .today-date strong{color:var(--text)}

  /* WEEK VIEW */
  .week-nav-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .week-btn{background:none;border:1px solid var(--border);border-radius:8px;width:34px;height:34px;font-size:18px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center}
  .week-title{flex:1;text-align:center;font-size:14px;font-weight:600;color:var(--text)}
  .type-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;margin-left:6px}
  .day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
  .day-card.today{border-color:var(--red);border-width:1.5px}
  .day-info{text-align:center;width:36px;flex-shrink:0}
  .day-name-s{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .day-date-s{font-size:11px;color:var(--muted);margin-top:1px}
  .day-sessions{flex:1;min-width:0}
  .session-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
  .session-row:last-child{margin-bottom:0}
  .session-emoji{font-size:13px;width:18px;flex-shrink:0}
  .session-text{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0}
  .dot.done{background:var(--green);border-color:var(--green)}
  .dot.skip{background:var(--red);border-color:var(--red)}

  /* SUMMARY */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
  .stat-num{font-size:24px;font-weight:700}
  .stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
  .bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px}
  .bar-title{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px}
  .bar-bg{background:var(--surface2);border-radius:10px;height:8px;overflow:hidden}
  .bar-fill{height:100%;border-radius:10px}
  .race-box{background:var(--red-light);border:1px solid var(--red-border);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
  .race-days-big{font-size:28px;font-weight:700;color:var(--red);line-height:1}
  .race-lbl{font-size:12px;font-weight:600;color:var(--red-dark)}
  .race-sub{font-size:10px;color:var(--red-dark);margin-top:2px}
  .sport-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .section-lbl{font-size:13px;font-weight:600;color:var(--sub);margin:12px 0 8px}

  /* WEIGHT */
  .weight-form{display:flex;gap:8px;margin-bottom:14px;align-items:flex-end}
  .weight-field{flex:1}
  .field-lbl{font-size:11px;color:var(--muted);margin-bottom:5px}
  .field-input{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:16px;background:var(--surface);color:var(--text);-webkit-appearance:none}
  .btn-save{padding:10px 18px;border-radius:var(--radius);background:var(--red);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
  .w-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border)}
  .w-row:last-child{border-bottom:none}
  .w-date{font-size:12px;color:var(--muted)}
  .w-val{font-size:15px;font-weight:600}
  .w-diff{font-size:11px;margin-left:6px;font-weight:600}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:28px 14px;line-height:1.6}
</style>
</head>

const SPORTS={
  "Natación":{e:"🏊",c:"#E6F1FB",l:"Natación",t:"Resistencia"},
  "Fondo Z2":{e:"🚴",c:"#EAF3DE",l:"Ciclismo",t:"Fondo Z2"},
  "Fondo Largo":{e:"🚴",c:"#EAF3DE",l:"Ciclismo",t:"Fondo largo"},
  "SS_":{e:"🚴",c:"#EAF3DE",l:"Ciclismo",t:"Sweet Spot"},
  "VO2_":{e:"🚴",c:"#FAEEDA",l:"Ciclismo",t:"VO2 Max"},
  "Tempo_":{e:"🚴",c:"#EAF3DE",l:"Ciclismo",t:"Tempo"},
  "FTP_Test":{e:"🚴",c:"#FAECE7",l:"Test FTP",t:"Test"},
  "FTP_":{e:"🚴",c:"#EAF3DE",l:"Ciclismo",t:"Umbral"},
  "Recovery_":{e:"🚴",c:"#F1EFE8",l:"Ciclismo",t:"Recuperación"},
  "Largo":{e:"🏃",c:"#E6F1FB",l:"Running",t:"Largo Z2"},
  "30-45 min":{e:"🏃",c:"#E6F1FB",l:"Running",t:"Z2 suave"},
  "45 min":{e:"🏃",c:"#E6F1FB",l:"Running",t:"Z2"},
  "Bici Z2 +":{e:"🔄",c:"#FBEAF0",l:"Brick",t:"Brick"},
  "Descanso":{e:"😴",c:"#F1EFE8",l:"Descanso",t:"Descanso"},
};
function sp(name){
  if(name==="Descanso") return SPORTS["Descanso"];
  for(const k of Object.keys(SPORTS)) if(name.includes(k)) return SPORTS[k];
  return {e:"🏃",c:"#E6F1FB",l:"Running",t:"Z2"};
}

const TODAY=new Date(),TS=TODAY.toISOString().slice(0,10);
const RACE=new Date("2026-11-29");
const DL=Math.ceil((RACE-TODAY)/(86400000));
document.getElementById("daysNum").textContent=DL>0?DL:"🏁";

let CW=1;
const te=PLAN.find(p=>p.d===TS);
if(te) CW=te.s; else{const f=PLAN.find(p=>p.d>TS);CW=f?f.s:18;}

function gs(d,sl){try{return localStorage.getItem("im_"+d+"_"+sl)||"pending";}catch(e){return"pending";}}
function ss(d,sl,v){try{const c=gs(d,sl);localStorage.setItem("im_"+d+"_"+sl,c===v?"pending":v);}catch(e){}}
function gw(){try{return JSON.parse(localStorage.getItem("im_weights")||"[]");}catch(e){return[];}}
function sw(arr){try{localStorage.setItem("im_weights",JSON.stringify(arr));}catch(e){}}

let AT="hoy";
function showTab(id){
  AT=id;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-btn-"+id).classList.add("active");
  document.querySelectorAll(".content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
  render();
}
function render(){
  if(AT==="hoy") rHoy();
  else if(AT==="semana") rSemana();
  else if(AT==="resumen") rResumen();
  else rPeso();
}

function wType(t){
  if(t==="Carga") return '<span class="type-pill" style="background:#E6F1FB;color:#185FA5">Carga</span>';
  if(t==="Descarga") return '<span class="type-pill" style="background:#EAF3DE;color:#3B6D11">Descarga</span>';
  return '<span class="type-pill" style="background:#FAEEDA;color:#854F0B">Test</span>';
}

function sCard(e,slot,label){
  const name=e[slot];
  if(name==="Descanso") return '<div class="rest-pill">'+label+' — 😴 Descanso</div>';
  const s=sp(name),st=gs(e.d,slot);
  return '<div class="card">'
    +'<div class="session-header">'
    +'<div class="sport-icon" style="background:'+s.c+'">'+s.e+'</div>'
    +'<div style="flex:1"><div class="session-slot">'+label+'</div>'
    +'<div class="session-name">'+name+'</div>'
    +'<div class="type-badge" style="background:'+s.c+';color:#3a3a38">'+s.l+' · '+s.t+'</div></div></div>'
    +'<div class="check-row"><span class="check-lbl">¿Completado?</span>'
    +'<div class="btn-group">'
    +'<button class="btn-check '+(st==="done"?"done":"")+'" onclick="mark(\''+e.d+'\',\''+slot+'\',\'done\')">✓ Listo</button>'
    +'<button class="btn-check '+(st==="skip"?"skip":"")+'" onclick="mark(\''+e.d+'\',\''+slot+'\',\'skip\')">✗ Skip</button>'
    +'</div></div></div>';
}

function mark(d,sl,v){ss(d,sl,v);render();}

function rHoy(){
  const el=document.getElementById("tab-hoy");
  const e=PLAN.find(p=>p.d===TS);
  if(!e){el.innerHTML='<div class="rest-pill" style="margin-top:8px">El plan inicia el 1 julio 2026.</div>';return;}
  const ms=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  const dt=new Date(e.d+"T12:00:00");
  el.innerHTML='<div class="today-date">Hoy — <strong>'+e.day+' '+dt.getDate()+' '+ms[dt.getMonth()]+'</strong></div>'
    +'<div class="week-tag">📅 Semana '+e.s+wType(e.t)+'</div>'
    +sCard(e,"am","🌅 Mañana")+sCard(e,"pm","🌆 Tarde");
}

function rSemana(){
  const el=document.getElementById("tab-semana");
  const days=PLAN.filter(p=>p.s===CW);
  const wt=days[0]?.t||"Carga";
  let h='<div class="week-nav-row">'
    +'<button class="week-btn" onclick="CW=Math.max(1,CW-1);rSemana()">‹</button>'
    +'<div class="week-title">Semana '+CW+wType(wt)+'</div>'
    +'<button class="week-btn" onclick="CW=Math.min(18,CW+1);rSemana()">›</button></div>';
  days.forEach(e=>{
    const isT=e.d===TS;
    const aS=sp(e.am),pS=sp(e.pm);
    const aSt=gs(e.d,"am"),pSt=gs(e.d,"pm");
    const dt=new Date(e.d+"T12:00:00");
    h+='<div class="day-card '+(isT?"today":"")+'">'
      +'<div class="day-info"><div class="day-name-s">'+e.day+'</div><div class="day-date-s">'+dt.getDate()+'/'+(dt.getMonth()+1).toString().padStart(2,"0")+'</div></div>'
      +'<div class="day-sessions">'
      +'<div class="session-row"><span class="session-emoji">'+aS.e+'</span><span class="session-text">'+e.am+'</span><div class="dot '+aSt+'"></div></div>'
      +(e.pm!=="Descanso"?'<div class="session-row"><span class="session-emoji">'+pS.e+'</span><span class="session-text">'+e.pm+'</span><div class="dot '+pSt+'"></div></div>':'')
      +'</div></div>';
  });
  el.innerHTML=h;
}

function rResumen(){
  const el=document.getElementById("tab-resumen");
  const past=PLAN.filter(p=>p.d<=TS);
  let tot=0,done=0,skip=0,sw2=0,bk=0,rn=0;
  past.forEach(e=>["am","pm"].forEach(sl=>{
    if(e[sl]==="Descanso") return; tot++;
    const st=gs(e.d,sl);
    if(st==="done") done++;
    if(st==="skip") skip++;
    const s=sp(e[sl]);
    if(s.l==="Natación") sw2++;
    else if(s.l==="Running") rn++;
    else bk++;
  }));
  const pct=tot>0?Math.round(done/tot*100):0;
  const pp=Math.round(past.length/PLAN.length*100);
  el.innerHTML='<div class="race-box">'
    +'<div><div class="race-days-big">'+(DL>0?DL:"🏁")+'</div><div class="race-lbl">días restantes</div><div class="race-sub">IRONMAN 70.3 Valdivia · 29 Nov 2026</div></div></div>'
    +'<div class="stat-grid">'
    +'<div class="stat-box"><div class="stat-num" style="color:var(--red)">'+pct+'%</div><div class="stat-lbl">adherencia</div></div>'
    +'<div class="stat-box"><div class="stat-num">'+done+'</div><div class="stat-lbl">completadas</div></div>'
    +'<div class="stat-box"><div class="stat-num">'+skip+'</div><div class="stat-lbl">saltadas</div></div>'
    +'<div class="stat-box"><div class="stat-num">'+pp+'%</div><div class="stat-lbl">plan transcurrido</div></div>'
    +'</div>'
    +'<div class="bar-wrap"><div class="bar-title"><span>Progreso plan</span><span>Sem '+CW+'/18</span></div>'
    +'<div class="bar-bg"><div class="bar-fill" style="width:'+pp+'%;background:var(--red)"></div></div></div>'
    +'<div class="bar-wrap"><div class="bar-title"><span>Adherencia</span><span>'+pct+'%</span></div>'
    +'<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:var(--green)"></div></div></div>'
    +'<div class="section-lbl">Sesiones por deporte</div>'
    +'<div class="bar-wrap">'+sBar("🏊","Natación",sw2,tot,"var(--blue)")+sBar("🚴","Ciclismo",bk,tot,"var(--green)")+sBar("🏃","Running",rn,tot,"var(--red)")+'</div>';
}

function sBar(ico,name,val,tot,color){
  const p=tot?Math.round(val/tot*100):0;
  return '<div class="sport-bar-row"><span style="width:20px;font-size:14px">'+ico+'</span>'
    +'<span style="flex:1;font-size:12px;color:var(--sub)">'+name+'</span>'
    +'<span style="font-size:12px;font-weight:600;color:var(--text)">'+val+'</span></div>'
    +'<div class="bar-bg" style="margin-bottom:10px"><div class="bar-fill" style="width:'+p+'%;background:'+color+'"></div></div>';
}

function rPeso(){
  const el=document.getElementById("tab-peso");
  const weights=gw().sort((a,b)=>a.date.localeCompare(b.date));
  const last=weights[weights.length-1];
  const prev=weights[weights.length-2];
  let lastB="";
  if(last){
    let dh="";
    if(prev){const d=(last.kg-prev.kg).toFixed(1);const c=d<=0?"var(--green)":"var(--red)";dh='<span class="w-diff" style="color:'+c+'">'+(d>0?"+":"")+d+' kg</span>';}
    lastB='<div class="bar-wrap" style="margin-bottom:14px">'
      +'<div class="bar-title"><span>Último registro</span><span>'+last.date+'</span></div>'
      +'<div style="display:flex;align-items:baseline;gap:8px"><span style="font-size:28px;font-weight:700;color:var(--text)">'+last.kg+' kg</span>'+dh+'</div></div>';
  }
  const recent=[...weights].reverse().slice(0,12);
  const hist=recent.length===0?'<div class="empty">Aún no hay registros.<br>Ingresa tu primer peso arriba.</div>'
    :recent.map((w,i)=>{
      const p2=weights[weights.length-2-i];
      let d="";
      if(p2){const dd=(w.kg-p2.kg).toFixed(1);const c=dd<=0?"var(--green)":"var(--red)";d='<span class="w-diff" style="color:'+c+'">'+(dd>0?"+":"")+dd+'</span>';}
      return '<div class="w-row"><span class="w-date">'+w.date+'</span><span style="display:flex;align-items:center"><span class="w-val">'+w.kg+' kg</span>'+d+'</span></div>';
    }).join("");
  el.innerHTML='<div class="section-lbl">Registrar peso</div>'
    +'<div class="weight-form">'
    +'<div class="weight-field"><div class="field-lbl">Peso (kg)</div>'
    +'<input class="field-input" type="number" id="wi" placeholder="73.5" step="0.1" min="40" max="150"></div>'
    +'<button class="btn-save" onclick="doW()">Guardar</button></div>'
    +lastB
    +'<div class="section-lbl">Historial</div>'
    +'<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);overflow:hidden">'+hist+'</div>';
}

function doW(){
  const v=parseFloat(document.getElementById("wi")?.value);
  if(isNaN(v)||v<40||v>150){alert("Peso inválido");return;}
  const today=new Date().toLocaleDateString("es-CL",{day:"2-digit",month:"2-digit",year:"numeric"});
  const arr=gw();arr.push({date:today,kg:v});sw(arr);rPeso();
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
render();
</script>
